<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2a0802"/>
      <stop offset="60%" stop-color="#8c1e05"/>
      <stop offset="100%" stop-color="#c47000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#DA2E08"/>
      <stop offset="100%" stop-color="#F38F04"/>
    </linearGradient>
    <!-- Partícula/rede decorativa -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Fundo -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Textura de pontos sutis -->
  <circle cx="80"  cy="80"  r="2" fill="rgba(243,143,4,.3)"/>
  <circle cx="200" cy="150" r="1.5" fill="rgba(218,46,8,.4)"/>
  <circle cx="350" cy="60"  r="2.5" fill="rgba(243,143,4,.25)"/>
  <circle cx="500" cy="130" r="1.5" fill="rgba(218,46,8,.3)"/>
  <circle cx="1100" cy="100" r="2" fill="rgba(243,143,4,.3)"/>
  <circle cx="1050" cy="200" r="1.5" fill="rgba(218,46,8,.35)"/>
  <circle cx="900"  cy="80"  r="2" fill="rgba(243,143,4,.28)"/>
  <line x1="80" y1="80" x2="200" y2="150" stroke="rgba(243,143,4,.15)" stroke-width="1"/>
  <line x1="200" y1="150" x2="350" y2="60" stroke="rgba(218,46,8,.12)" stroke-width="1"/>
  <line x1="900" y1="80" x2="1050" y2="200" stroke="rgba(243,143,4,.12)" stroke-width="1"/>
  <line x1="1050" y1="200" x2="1100" y2="100" stroke="rgba(218,46,8,.1)" stroke-width="1"/>

  <!-- Linha decorativa lateral esquerda -->
  <rect x="80" y="180" width="4" height="260" rx="2" fill="url(#accent)" opacity="0.8"/>

  <!-- Logo LF mark -->
  <rect x="100" y="198" width="80" height="80" rx="14" fill="url(#accent)" opacity="0.95"/>
  <text x="140" y="252" text-anchor="middle" font-family="Georgia,serif"
        font-size="32" font-weight="700" fill="white" letter-spacing="2">LF</text>

  <!-- Título -->
  <text x="210" y="245" font-family="Georgia,'Times New Roman',serif"
        font-size="58" font-weight="700" fill="white" letter-spacing="-1">LabFood</text>

  <!-- Subtítulo menor -->
  <text x="210" y="285" font-family="Arial,Helvetica,sans-serif"
        font-size="20" fill="rgba(255,255,255,0.55)" letter-spacing="3">LABORATÓRIO DE CONTROLE E QUALIDADE DE ALIMENTOS</text>

  <!-- Linha divisória -->
  <line x1="100" y1="320" x2="760" y2="320" stroke="rgba(255,255,255,.12)" stroke-width="1"/>

  <!-- Descrição -->
  <text x="100" y="365" font-family="Arial,Helvetica,sans-serif"
        font-size="22" fill="rgba(255,255,255,.75)">Análises físico-químicas e microbiológicas com rigor científico.</text>
  <text x="100" y="395" font-family="Arial,Helvetica,sans-serif"
        font-size="22" fill="rgba(255,255,255,.75)">Ensino · Pesquisa · Extensão — Universidade Federal de Goiás.</text>

  <!-- Badge UFG -->
  <rect x="100" y="430" width="200" height="38" rx="19" fill="rgba(255,255,255,.08)" stroke="rgba(255,255,255,.18)" stroke-width="1"/>
  <text x="200" y="454" text-anchor="middle" font-family="Arial,sans-serif"
        font-size="13" fill="rgba(255,255,255,.7)" letter-spacing="2">UFG · GOIÂNIA · BRASIL</text>

  <!-- Email -->
  <text x="100" y="520" font-family="'Courier New',monospace"
        font-size="16" fill="rgba(243,143,4,.85)" letter-spacing="1">labfood.agro@ufg.br</text>

  <!-- Decoração direita — frasco estilizado -->
  <g transform="translate(920, 130)" opacity="0.18">
    <rect x="60" y="0" width="40" height="14" rx="5" fill="white"/>
    <path d="M60 14 L48 80 Q38 120 28 150 Q24 160 32 163 L108 163 Q116 160 112 150 Q102 120 92 80 L80 14 Z"
          fill="none" stroke="white" stroke-width="3"/>
    <path d="M38 115 Q34 140 30 155 Q27 163 32 163 L108 163 Q113 163 110 155 Q106 140 102 115 Z"
          fill="white" opacity="0.6"/>
  </g>
</svg>
